<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Trivia Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .header p {
            color: #666;
            font-size: 1em;
        }

        .quiz-container {
            display: none;
        }

        .quiz-container.active {
            display: block;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            transition: width 0.3s ease;
        }

        .question-number {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        .option {
            background: #ee0404;
            border: 2px solid #ddd;
            padding: 15px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
            text-align: left;
        }

        .option:hover {
            background: #e8f0ff;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .option.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .option.incorrect {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        .option:disabled {
            cursor: not-allowed;
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            font-weight: bold;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #c8e6c9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }

        .feedback.incorrect {
            background: #ffcdd2;
            color: #c62828;
            border-left: 4px solid #f44336;
        }

        .next-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            width: 100%;
            font-weight: bold;
            display: none;
        }

        .next-button.show {
            display: block;
        }

        .next-button:hover {
            background: #764ba2;
            transform: scale(1.02);
        }

        .results-container {
            display: none;
            text-align: center;
        }

        .results-container.active {
            display: block;
        }

        .score-display {
            font-size: 3em;
            color: #667eea;
            font-weight: bold;
            margin: 30px 0;
        }

        .score-text {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 20px;
        }

        .score-message {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .restart-button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .restart-button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .start-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .start-screen.active {
            display: flex;
        }

        .start-screen h2 {
            color: #333;
            font-size: 1.5em;
            margin: 20px 0;
        }

        .start-screen p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.05em;
        }

        .start-button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 25px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            margin-top: 20px;
        }

        .start-button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .emoji {
            font-size: 3em;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .question-text {
                font-size: 1.1em;
            }

            .option {
                padding: 12px 15px;
                font-size: 0.95em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦁 Animal Trivia Challenge 🦁</h1>
            <p>Test your animal knowledge with these tricky questions!</p>
        </div>

        <!-- Start Screen -->
        <div class="start-screen active">
            <div class="emoji">🐾</div>
            <h2>Ready to Challenge Yourself?</h2>
            <p>You'll face 10 tough animal trivia questions. Pick the correct answer for each question. Can you get them all right?</p>
            <button class="start-button" onclick="startQuiz()">Start Quiz</button>
        </div>

        <!-- Quiz Container -->
        <div class="quiz-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="question-number" id="questionNumber"></div>
            <div class="question-text" id="questionText"></div>
            
            <div class="options" id="optionsContainer"></div>
            
            <div class="feedback" id="feedback"></div>
            
            <button class="next-button" id="nextButton" onclick="nextQuestion()">Next Question</button>
        </div>

        <!-- Results Container -->
        <div class="results-container">
            <div class="emoji">🏆</div>
            <div class="score-text">Your Final Score</div>
            <div class="score-display" id="scoreDisplay">0/10</div>
            <div class="score-message" id="scoreMessage"></div>
            <button class="restart-button" onclick="restartQuiz()">Try Again</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "Which animal has the longest neck among all land animals?",
                options: ["Ostrich", "Giraffe", "Llama", "Camel"],
                correct: 1
            },
            {
                question: "What is the only mammal that cannot jump?",
                options: ["Sloth", "Elephant", "Hippopotamus", "Whale"],
                correct: 3
            },
            {
                question: "How many chambers does a giraffe's heart have?",
                options: ["2", "3", "4", "5"],
                correct: 2
            },
            {
                question: "Which animal's stripes are unique like human fingerprints?",
                options: ["Tiger", "Zebra", "Okapi", "Badger"],
                correct: 0
            },
            {
                question: "What is the only bird that can fly backwards?",
                options: ["Swift", "Sparrow", "Hummingbird", "Woodpecker"],
                correct: 2
            },
            {
                question: "How many eyes does a bee have?",
                options: ["2", "3", "5", "8"],
                correct: 2
            },
            {
                question: "Which animal has blue blood?",
                options: ["Squid", "Octopus", "Horseshoe Crab", "Dolphin"],
                correct: 2
            },
            {
                question: "What is the fastest land animal?",
                options: ["Lion", "Gazelle", "Cheetah", "sloth"],
                correct: 3
            },
            {
                question: "How many tentacles does an octopus have?",
                options: ["6", "8", "10", "12"],
                correct: 1
            },
            {
                question: "Which animal can sleep standing up and fall asleep instantly?",
                options: ["Giraffe", "Cow", "Horse", "Deer"],
                correct: 2
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        let selectedAnswer = null;

        function startQuiz() {
            document.querySelector('.start-screen').classList.remove('active');
            document.querySelector('.quiz-container').classList.add('active');
            loadQuestion();
        }

        function loadQuestion() {
            const question = quizData[currentQuestion];
            document.getElementById('questionNumber').textContent = `Question ${currentQuestion + 1} of ${quizData.length}`;
            document.getElementById('questionText').textContent = question.question;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'option';
                button.textContent = option;
                button.onclick = () => selectAnswer(index);
                optionsContainer.appendChild(button);
            });

            updateProgressBar();
            resetFeedback();
            answered = false;
            selectedAnswer = null;
            document.getElementById('nextButton').classList.remove('show');
        }

        function selectAnswer(index) {
            if (answered) return;

            answered = true;
            selectedAnswer = index;
            const question = quizData[currentQuestion];
            const options = document.querySelectorAll('.option');

            options.forEach((option, i) => {
                option.disabled = true;
                if (i === question.correct) {
                    option.classList.add('correct');
                } else if (i === index && index !== question.correct) {
                    option.classList.add('incorrect');
                }
            });

            const feedback = document.getElementById('feedback');
            if (index === question.correct) {
                score++;
                feedback.textContent = '✓ Correct! Well done!';
                feedback.classList.add('correct');
            } else {
                feedback.textContent = `✗ Wrong! The correct answer is: ${question.options[question.correct]}`;
                feedback.classList.add('incorrect');
            }
            feedback.classList.add('show');
            document.getElementById('nextButton').classList.add('show');
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.querySelector('.quiz-container').classList.remove('active');
            document.querySelector('.results-container').classList.add('active');
            
            document.getElementById('scoreDisplay').textContent = `${score}/${quizData.length}`;
            
            let message = '';
            const percentage = (score / quizData.length) * 100;

            if (percentage === 100) {
                message = "🌟 Perfect Score! You're an animal expert!";
            } else if (percentage >= 80) {
                message = "🎉 Excellent work! You know your animals!";
            } else if (percentage >= 60) {
                message = "👏 Good job! You did well!";
            } else if (percentage >= 40) {
                message = "💪 Not bad! Keep learning about animals!";
            } else {
                message = "🔄 Nice try! Learn more and try again!";
            }

            document.getElementById('scoreMessage').textContent = message;
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            answered = false;
            selectedAnswer = null;
            document.querySelector('.results-container').classList.remove('active');
            document.querySelector('.start-screen').classList.add('active');
        }

        function updateProgressBar() {
            const progress = ((currentQuestion + 1) / quizData.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function resetFeedback() {
            const feedback = document.getElementById('feedback');
            feedback.classList.remove('show', 'correct', 'incorrect');
            feedback.textContent = '';
        }
    </script>
</body>
</html>
